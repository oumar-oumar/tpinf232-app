<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>



    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        .container {
            padding: 20px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* GRID LAYOUT */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px;
        }

        /* CARDS */
        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: left;
        }

        .full {
            grid-column: 1 / -1;
        }

        /* CANVAS */
        canvas {
            width: 100% !important;
            height: 300px !important;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px;
        }

        /* BUTTON */
        button {
            padding: 10px 18px;
            margin: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* BACK BUTTON */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            text-decoration: none;
             background: #3b83f6e3;
            padding: 10px;
            border-radius: 50%;
            color: rgb(255, 255, 255);
        }

        .search-box {
    margin: 20px auto;
}

.search-box input {
    padding: 10px;
    width: 250px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.search-box button {
    margin-left: 10px;
}

.search-box {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    align-items: center;
}

.search-box input {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    outline: none;
    width: 200px;
}

.search-box button {
    padding: 8px 12px;
    border-radius: 20px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.title {
    position: sticky;
    top: 0;
    background: rgba(15, 23, 42, 0.9);
    padding: 10px;
    z-index: 100;
    backdrop-filter: blur(10px);
}

.topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
}

/* titre */
.topbar h2 {
    margin: 0;
    flex: 1;
    text-align: center;
    font-size: 22px;
}

/* flèche */
.back-btn {
    position: absolute;
    left: 20px;
    font-size: 18px;
    text-decoration: none;
     background: #3b83f6e1;
    padding: 10px;
    border-radius: 50%;
    color: white;
}

/* recherche */
.search-box {
    position: absolute;
    right: 20px;
    display: flex;
    gap: 8px;
}

.search-box input {
    padding: 6px 10px;
    border-radius: 20px;
    border: none;
    outline: none;
}

.search-box button {
    border-radius: 20px;
    border: none;
    padding: 6px 10px;
    background: #3b83f6e1;
    color: white;
}


.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9999;
}

.modal-content {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);

    background: #1e293b;
    width: 90%;
    max-width: 450px;

    border-radius: 15px 15px 0 0;

    padding: 20px;
    max-height: 70vh;
    overflow-y: auto;

    color: white;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
}

.hidden {
    display: none !important;
}

    </style>
</head>

<body>

<div class="topbar">

    <a href="/home" class="back-btn">⬅</a>

    <h2>📊 Dashboard des statistiques</h2>


    <div class="search-box">
        <input type="text" id="searchInput"
               placeholder="🔎 Nom, ville, âge, sexe...">
        <button onclick="searchUser()">Rechercher</button>
    </div>

</div>

<!-- 🔥 MODAL DOIT ÊTRE ICI (HORS TOPBAR) -->
<div id="resultModal" class="modal hidden">
    <div class="modal-content">

        <h3>🔎 Résultats de recherche</h3>

        <div id="results"></div>

        <button onclick="closeModal()">❌ Fermer</button>

    </div>
</div>
    <div class="grid">

        <div class="card" id="stats">Chargement...</div>

        <div class="card">
            <h3>📈 Régression linéaire</h3>
            <p id="regression"></p>
            <p id="interpretation"></p>
            <p id="classe"></p>
        </div>

    </div>

    <div class="grid">
        <canvas id="chartSexe"></canvas>
        <canvas id="chartTemps"></canvas>
    </div>

    <div class="card full">
        <canvas id="chartCluster"></canvas>
    </div>

    <div id="legend"></div>

    <button onclick="exportPDF()">📄 Exporter PDF</button>

</div>

<script>

let lastData = null;

// ================= LOAD =================
async function loadStats() {
    try {
        const res = await fetch("/stats");
        const data = await res.json();

        lastData = data;

        // STATS
        document.getElementById("stats").innerHTML = `
            <h3>📊 Statistiques</h3>
            Total: ${data.total}<br>
            Âge moyen: ${data.moyenneAge}<br>
            Temps téléphone: ${data.moyenneTemps} h<br>
            Hommes: ${data.hommes}<br>
            Femmes: ${data.femmes}
        `;

        // REGRESSION
        document.getElementById("regression").innerHTML =
            "y = " + data.regression.a + "x + " + data.regression.b;

        document.getElementById("interpretation").innerHTML = data.trend;
        document.getElementById("classe").innerHTML = "Classification: " + data.classe;

        // SEXE CHART
        new Chart(document.getElementById("chartSexe"), {
            type: "pie",
            data: {
                labels: ["Hommes", "Femmes"],
                datasets: [{
                    data: [data.hommes, data.femmes]
                }]
            }
        });

        // TEMPS CHART
        new Chart(document.getElementById("chartTemps"), {
            type: "bar",
            data: {
                labels: ["Temps téléphone"],
                datasets: [{
                    label: "Heures",
                    data: [data.moyenneTemps]
                }]
            }
        });

        // CLUSTER
        if (data.ages && data.temps_list && data.clusters) {

            const colors = data.clusters.map(c => {
                if (c === 0) return "blue";
                if (c === 1) return "green";
                return "red";
            });

            new Chart(document.getElementById("chartCluster"), {
                type: "scatter",
                data: {
                    datasets: [{
                        label: "Clusters",
                        data: data.ages.map((age, i) => ({
                            x: age,
                            y: data.temps_list[i]
                        })),
                        backgroundColor: colors,
                        pointRadius: 6
                    }]
                },
                options: {
                    scales: {
                        x: { title: { display: true, text: "Âge" } },
                        y: { title: { display: true, text: "Temps téléphone" } }
                    }
                }
            });

            document.getElementById("legend").innerHTML = `
                🔵 Cluster 0 : ${data.clusters.filter(c => c === 0).length} utilisateurs <br>
                🟢 Cluster 1 : ${data.clusters.filter(c => c === 1).length} utilisateurs <br>
                🔴 Cluster 2 : ${data.clusters.filter(c => c === 2).length} utilisateurs
            `;
        }

    } catch (err) {
        console.log(err);
        document.getElementById("stats").innerHTML = "❌ Erreur de chargement";
    }
}

// ================= EXPORT PDF =================
async function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFontSize(18);
    doc.text("Rapport Data Science", 105, 20, { align: "center" });

    if (!lastData) {
        doc.text("Aucune donnée", 10, 40);
        doc.save("rapport.pdf");
        return;
    }

    doc.setFontSize(12);
    doc.text("Total: " + lastData.total, 10, 40);
    doc.text("Âge moyen: " + lastData.moyenneAge, 10, 50);
    doc.text("Temps moyen: " + lastData.moyenneTemps, 10, 60);

    doc.save("rapport.pdf");
}

// LOAD AUTO
loadStats();
async function searchUser() {
    const q = document.getElementById("searchInput").value;

    const res = await fetch("/search?q=" + q);
    const data = await res.json();

    const resultsDiv = document.getElementById("results");

    // 🔥 IMPORTANT : on vide toujours avant
    resultsDiv.innerHTML = "";

    if (data.length === 0) {
        resultsDiv.innerHTML = "<p>Aucun résultat trouvé</p>";
    } else {
        data.forEach(u => {
            resultsDiv.innerHTML += `
                <div class="card">
                    👤 Nom: ${u[0]} <br>
                    🎂 Âge: ${u[1]} <br>
                    🚻 Sexe: ${u[2]} <br>
                    📍 Ville: ${u[3]} <br>
                    ⏱ Temps: ${u[4]} h
                </div>
            `;
        }); 
    }

    document.getElementById("resultModal").classList.remove("hidden");
}

function closeModal() {
    const modal = document.getElementById("resultModal");

    modal.classList.add("hidden");

    // 🔥 nettoyage propre
    document.getElementById("results").innerHTML = "";
}

</script>

</body>
</html>
